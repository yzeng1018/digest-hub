name: Growth Radar Daily Digest

on:
  schedule:
    - cron: "0 21 * * *"   # 北京时间 05:00（UTC 前一天 21:00）
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: channels/growth-radar/package-lock.json

      - name: 安装依赖
        run: npm install && npm install --prefix channels/growth-radar

      - name: 运行 Growth Radar digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ZHIPU_API_KEY:      ${{ secrets.ZHIPU_API_KEY }}
          PRIMARY_MODEL:      ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL:     ${{ vars.FALLBACK_MODEL }}
        run: node channels/growth-radar/main.js
