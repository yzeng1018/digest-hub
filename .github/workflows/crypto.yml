name: 加密情报 Daily Digest

on:
  schedule:
    - cron: "45 21 * * *"   # 北京时间 05:45（UTC 21:45），提前触发确保 07:30 前送达
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: channels/crypto/package-lock.json

      - name: 安装依赖
        run: npm install && npm install --prefix channels/crypto

      - name: 运行加密情报 digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          ZHIPU_API_KEY:      ${{ secrets.ZHIPU_API_KEY }}
          PRIMARY_MODEL:      ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL:     ${{ vars.FALLBACK_MODEL }}
        run: node channels/crypto/main.js
