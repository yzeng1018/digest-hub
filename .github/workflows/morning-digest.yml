name: 早报合集 Daily Digest

on:
  schedule:
    - cron: "30 23 * * *"   # 北京时间 07:30（UTC 23:30）
  workflow_dispatch:

jobs:
  ai-info:
    name: AI情报
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: channels/ai-info/package-lock.json

      - name: 安装依赖
        run: npm install && npm install --prefix channels/ai-info

      - name: 运行 AI情报 digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          DEEPSEEK_API_KEY:      ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY:      ${{ secrets.ZHIPU_API_KEY }}
          PRIMARY_MODEL:      ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL:     ${{ vars.FALLBACK_MODEL }}
          CHANNEL_NAME:       digest-hub/ai-info
        run: node channels/ai-info/main.js

      - name: 提交 usage 日志
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/usage.jsonl 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "chore: log AI usage [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || sleep $((i * 3))
          done

  general-news:
    name: 科技财经速读
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: channels/general-news/requirements.txt

      - name: 安装依赖
        run: pip install -r channels/general-news/requirements.txt

      - name: 运行科技财经 digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          DEEPSEEK_API_KEY:      ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY:      ${{ secrets.ZHIPU_API_KEY }}
          PRIMARY_MODEL:      ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL:     ${{ vars.FALLBACK_MODEL }}
          CHANNEL_NAME:       digest-hub/general-news
        run: python channels/general-news/main.py

      - name: 提交 usage 日志
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/usage.jsonl 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "chore: log AI usage [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || sleep $((i * 3))
          done

  investment:
    name: 投资情报
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: channels/investment/requirements.txt

      - name: 安装依赖
        run: pip install -r channels/investment/requirements.txt

      - name: 运行投资情报 digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          DEEPSEEK_API_KEY:      ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY:      ${{ secrets.ZHIPU_API_KEY }}
          PRIMARY_MODEL:      ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL:     ${{ vars.FALLBACK_MODEL }}
          CHANNEL_NAME:       digest-hub/investment
        run: python channels/investment/main.py

      - name: 提交 usage 日志
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/usage.jsonl 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "chore: log AI usage [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || sleep $((i * 3))
          done
