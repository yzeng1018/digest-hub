name: 早报合集 Daily Digest

on:
  schedule:
    - cron: "30 23 * * *"   # 北京时间 07:30（UTC 23:30）
  workflow_dispatch:

jobs:
  ai-info:
    name: AI情报
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: channels/ai-info/package-lock.json

      - name: 安装依赖
        run: npm install && npm install --prefix channels/ai-info

      - name: 运行 AI情报 digest
        env:
          QWEN_API_KEY:       ${{ secrets.QWEN_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          GATEWAY_URL:        https://gateway.asksidra.com/v1
          GATEWAY_API_KEY:    ${{ secrets.GATEWAY_API_KEY }}
          VOLCENGINE_API_KEY: ${{ secrets.VOLCENGINE_API_KEY }}
        run: node channels/ai-info/main.js

  general-news:
    name: 科技财经速读
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: channels/general-news/requirements.txt

      - name: 安装依赖
        run: pip install -r channels/general-news/requirements.txt

      - name: 运行科技财经 digest
        env:
          QWEN_API_KEY:       ${{ secrets.QWEN_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          GATEWAY_URL:        https://gateway.asksidra.com/v1
          GATEWAY_API_KEY:    ${{ secrets.GATEWAY_API_KEY }}
          VOLCENGINE_API_KEY: ${{ secrets.VOLCENGINE_API_KEY }}
        run: python channels/general-news/main.py

  investment:
    name: 投资情报
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: channels/investment/requirements.txt

      - name: 安装依赖
        run: pip install -r channels/investment/requirements.txt

      - name: 运行投资情报 digest
        env:
          QWEN_API_KEY:       ${{ secrets.QWEN_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          GATEWAY_URL:        https://gateway.asksidra.com/v1
          GATEWAY_API_KEY:    ${{ secrets.GATEWAY_API_KEY }}
          VOLCENGINE_API_KEY: ${{ secrets.VOLCENGINE_API_KEY }}
        run: python channels/investment/main.py
