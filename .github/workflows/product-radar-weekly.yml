name: 产品设计雷达 · 周报

on:
  schedule:
    - cron: "0 2 * * 6"   # 北京时间周六 10:00（UTC 周六 02:00）
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: channels/product-radar/requirements.txt

      - name: 安装依赖
        run: pip install -r channels/product-radar/requirements.txt

      - name: 运行产品设计周报
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          ZHIPU_API_KEY:      ${{ secrets.ZHIPU_API_KEY }}
          PRIMARY_MODEL:      ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL:     ${{ vars.FALLBACK_MODEL }}
        run: python channels/product-radar/main_weekly.py
