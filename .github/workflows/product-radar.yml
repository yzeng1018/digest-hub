name: 产品设计雷达 Daily Digest

on:
  schedule:
    - cron: "30 21 * * *"   # 北京时间 05:30（UTC 21:30 前一天）
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: channels/product-radar/requirements.txt

      - name: 安装依赖
        run: pip install -r channels/product-radar/requirements.txt

      - name: 运行产品设计雷达 digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          ZHIPU_API_KEY:      ${{ secrets.ZHIPU_API_KEY }}
          PRIMARY_MODEL:      ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL:     ${{ vars.FALLBACK_MODEL }}
        run: python channels/product-radar/main.py
