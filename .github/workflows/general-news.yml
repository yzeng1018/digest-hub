name: 科技财经速读 Daily Digest

on:
  schedule:
    - cron: "30 23 * * *"   # 北京时间 07:30（UTC 23:30）
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: channels/general-news/requirements.txt

      - name: 安装依赖
        run: pip install -r channels/general-news/requirements.txt

      - name: 运行科技财经 digest
        env:
          QWEN_API_KEY:       ${{ secrets.QWEN_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
        run: python channels/general-news/main.py
